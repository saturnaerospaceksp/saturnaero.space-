<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rhea and Iapetus vehicle page." />
    <meta name="theme-color" content="#05070d" />
    <link rel="icon" href="./img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="./src/styles.css" />
    <title>Saturn | Rhea &amp; Iapetus</title>
  </head>
  <body class="page-content">
    <main class="page-shell page-shell--content">
      <section class="page-hero" aria-label="Rhea and Iapetus splash screen">
        <div class="page-hero__media" aria-hidden="true"></div>
        <header class="site-header site-header--page">
          <nav class="site-nav" aria-label="Primary">
            <a class="site-nav__brand" href="index.html#top">
              <img class="site-nav__brand-icon" src="./img/favicon.png" alt="" />
              <span>Saturn Aerospace</span>
            </a>
            <div class="site-nav__links">
              <a class="site-nav__home" href="index.html#top">Home</a>
              <a class="site-nav__chip" href="scom.html">SCOM</a>
              <a class="site-nav__chip" href="ksc.html">Spaceport</a>
              <a class="site-nav__chip" href="shop.html">Shop</a>
            </div>
          </nav>
        </header>
        <div class="page-hero__content">
          <div class="page-intro__eyebrow">Vehicles</div>
          <h1 class="hero__title">
            <span class="hero__title-base">Rhea &amp; Iapetus</span>
            <span class="hero__title-sheen" aria-hidden="true">Rhea &amp; Iapetus</span>
          </h1>
          <p class="subtitle">
            Built as part of the fleet, not as a one-off
          </p>
        </div>
      </section>

      <section class="page-intro" aria-label="Work in progress">
        <div class="page-intro__inner">
          <h1>WIP</h1>
        </div>
      </section>
    </main>
    <script>
      const dropdowns = Array.from(document.querySelectorAll('.nav-group'));

      dropdowns.forEach((current) => {
        current.addEventListener('toggle', () => {
          if (!current.open) {
            return;
          }

          dropdowns.forEach((other) => {
            if (other !== current) {
              other.open = false;
            }
          });
        });
      });
    </script>
    <script src="./src/site.js"></script>
  </body>
</html>
