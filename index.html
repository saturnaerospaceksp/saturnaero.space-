<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hello World">
    <title>Hello World</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            color: #111827;
        }

        main {
            width: min(100%, 720px);
            padding: clamp(24px, 5vw, 48px);
            border: 1px solid #dbe2ea;
            border-radius: 16px;
            background: #ffffff;
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 6vw, 3.5rem);
            line-height: 1.1;
        }

        p {
            margin: 0;
            font-size: clamp(1rem, 2.5vw, 1.125rem);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <main>
        <h1>Hello World</h1>
        <p>This page is responsive and should work cleanly on phones, tablets, and desktop screens.</p>
    </main>
</body>
</html>
